<!-- 
Edição e Linhas
---------------
Alt +  seta para cima/baixo : Move a linha para cima/baixo.
Alt + Shift + seta para cima/baixo : Copia a linha para cima/baixo.
Ctrl + Shift + K: Deleta a linha atual.
Ctrl + Enter / Ctrl + Shift + Enter: Insere linha abaixo/acima.
Ctrl + /: Comenta ou descomenta a linha/seleção.
Alt + Shift + F: Formata o código (Prettier). 

Seleção e Navegação:
--------------------
Ctrl + D: Seleciona a próxima ocorrência da palavra.
Ctrl + Shift + L: Seleciona todas as ocorrências da seleção.
Ctrl + G: Vai para uma linha específica.
Ctrl + P: Abre busca rápida de arquivos.
Ctrl + Shift + O: Vai para um símbolo (função/variável) no arquivo. 

Interface e Gerenciamento:
--------------------------
Ctrl + B: Abre/fecha a barra lateral.
Ctrl + Shift + P: Abre a Paleta de Comandos.
Ctrl + Shift + ': Abre/fecha o terminal integrado.
Ctrl + Shift + F: Pesquisa global em todos os arquivos.
Ctrl + Tab: Alterna entre arquivos abertos.
Ctrl + ,: Abre as configurações. 

Multi-cursor: 
-------------
Clique com Alt + Clique em vários locais para editar simultaneamente.

Visualizar Atalhos:
-------------------
Pressione Ctrl + K e depois Ctrl + S para abrir a lista completa de atalhos e personalizar os seus

Para clonar com o GitHub (se o repositório já estiver criado):
--------------------------------------------------------------
Pressione Ctrl + Shift + P
digite Git:Clone
cole a URL
selecione a pasta local.

Para sincronizar com o GitHub (se o repositório já estiver criado e clonado):
-----------------------------------------------------------------------------
git init
git add .
git commit -m "inicio da estrutura"
git push
-->
